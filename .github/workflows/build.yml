name: Android Build

on:
  push:
    branches: [ master, main, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master, main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # DEBUG build — runs on every push/PR
  # ─────────────────────────────────────────────────────────────
  build-debug:
    name: Debug APK
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/'))

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK 21.4.7075529
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;21.4.7075529" \
            "cmake;3.10.2.4988404" \
            "build-tools;35.0.0" \
            "platforms;android-35"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/buildSrc/**') }}
          restore-keys: gradle-

      - name: Cache NDK build outputs
        uses: actions/cache@v4
        with:
          path: |
            TMessagesProj/.cxx
            TMessagesProj/build/intermediates/cmake
          key: ndk-${{ runner.os }}-${{ hashFiles('TMessagesProj/jni/**') }}
          restore-keys: ndk-${{ runner.os }}-

      # Use the repo's placeholder keystore for debug builds.
      # If RELEASE_KEYSTORE_BASE64 secret is set, it will be used instead.
      - name: Prepare signing keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > TMessagesProj/config/release.keystore
            echo "Using repository signing keystore from secrets."
          else
            echo "No signing keystore secret found — using placeholder keystore."
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK (afar ABI split)
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD || 'android' }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS || 'androidkey' }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD || 'android' }}
        run: |
          ./gradlew :TMessagesProj_App:assembleDebug \
            -PRELEASE_STORE_PASSWORD="$RELEASE_STORE_PASSWORD" \
            -PRELEASE_KEY_ALIAS="$RELEASE_KEY_ALIAS" \
            -PRELEASE_KEY_PASSWORD="$RELEASE_KEY_PASSWORD" \
            --no-daemon \
            --stacktrace

      - name: Find debug APK
        id: find_apk
        run: |
          echo "Searching for APK files..."
          find . -name '*.apk' -not -path '*/node_modules/*' 2>/dev/null | head -20
          APK_DIR=$(find . -path '*/outputs/apk/debug' -type d 2>/dev/null | head -1)
          echo "apk_dir=$APK_DIR" >> $GITHUB_OUTPUT

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-${{ github.run_number }}
          path: |
            **/outputs/apk/debug/*.apk
            **/outputs/apk/**/*.apk
          if-no-files-found: warn
          retention-days: 14

  # ─────────────────────────────────────────────────────────────
  # RELEASE build — runs only on version tags (v*)
  # ─────────────────────────────────────────────────────────────
  build-release:
    name: Release APK
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK 21.4.7075529
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;21.4.7075529" \
            "cmake;3.10.2.4988404" \
            "build-tools;35.0.0" \
            "platforms;android-35"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/buildSrc/**') }}
          restore-keys: gradle-

      - name: Cache NDK build outputs
        uses: actions/cache@v4
        with:
          path: |
            TMessagesProj/.cxx
            TMessagesProj/build/intermediates/cmake
          key: ndk-${{ runner.os }}-${{ hashFiles('TMessagesProj/jni/**') }}
          restore-keys: ndk-${{ runner.os }}-

      - name: Prepare release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "::error::RELEASE_KEYSTORE_BASE64 secret is required for release builds."
            exit 1
          fi
          echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > TMessagesProj/config/release.keystore

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          ./gradlew :TMessagesProj_App:assembleRelease \
            -PRELEASE_STORE_PASSWORD="$RELEASE_STORE_PASSWORD" \
            -PRELEASE_KEY_ALIAS="$RELEASE_KEY_ALIAS" \
            -PRELEASE_KEY_PASSWORD="$RELEASE_KEY_PASSWORD" \
            --no-daemon \
            --stacktrace

      - name: Collect APK checksums
        run: |
          find TMessagesProj_App/build/outputs/apk/release -name "*.apk" \
            -exec sha256sum {} \; > checksums.txt
          cat checksums.txt

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ github.ref_name }}
          path: TMessagesProj_App/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums-${{ github.ref_name }}
          path: checksums.txt
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            TMessagesProj_App/build/outputs/apk/release/*.apk
            checksums.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────
  # LINT — fast check on every push
  # ─────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-lint-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-lint-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run lint
        # Pre-existing Telegram source has lint warnings (e.g. LocationManager
        # permission issues in the upstream repo). We run lint for visibility
        # but do not fail the workflow on upstream issues.
        continue-on-error: true
        run: |
          ./gradlew :TMessagesProj:lint \
            --no-daemon \
            --continue

      - name: Upload lint report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-report-${{ github.run_number }}
          path: |
            TMessagesProj/build/reports/lint-results*.html
            TMessagesProj/build/reports/lint-results*.xml
          if-no-files-found: ignore
          retention-days: 7
